# conf.d/main.conf — rutas del SaaS
# IMPORTANTE: La ruta /internal/ NO existe aquí. Los endpoints internos
# solo son accesibles desde la red Docker `app` (n8n -> bot-service:3000).

upstream bot_service   { server bot-service:3000; }
upstream admin_panel   { server admin-panel:80; }
upstream client_panel  { server client-panel:80; }
upstream n8n_service   { server n8n:5678; }
upstream minio_console { server minio:9001; }

server {
  listen 80;
  server_name _;

  # Let's Encrypt challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Webhook de Meta
  location /webhook {
    proxy_pass http://bot_service;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # API de los paneles React
  location /api/ {
    proxy_pass http://bot_service;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # n8n
  location /n8n/ {
    proxy_pass http://n8n_service;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  # Minio console
  location /minio/ {
    proxy_pass http://minio_console/;
    proxy_set_header Host $host;
  }

  # Panel cliente
  location /cliente/ {
    proxy_pass http://client_panel/;
    proxy_set_header Host $host;
  }

  # Panel operador (raíz)
  location / {
    proxy_pass http://admin_panel;
    proxy_set_header Host $host;
  }
}
